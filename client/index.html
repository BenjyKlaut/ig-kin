<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>IG-PNC Client Prototype</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
      }
      .hidden {
        display: none;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
      }
      th {
        background: #f2f2f2;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        background: #eee;
      }
    </style>
  </head>
  <body>
    <h2>IG-PNC — Prototype</h2>

    <div id="login">
      <h3>Connexion</h3>
      <label>Matricule: <input id="matricule" /></label><br />
      <label>Mot de passe: <input id="password" type="password" /></label><br />
      <button id="btnLogin">Se connecter</button>
      <div id="loginMsg"></div>
    </div>

    <div id="app" class="hidden">
      <button id="btnLogout">Déconnexion</button>
      <h3>Recherche de rapports</h3>
      <label>District: <input id="filterDistrict" /></label>
      <label>Commune: <input id="filterCommune" /></label>
      <button id="btnSearch">Rechercher</button>
      <button id="btnNew">Nouveau rapport</button>

      <div id="results"></div>

      <div id="formReport" class="hidden">
        <h3>Créer rapport</h3>
        <label>District: <input id="r_district" /></label><br />
        <label>Commune: <input id="r_commune" /></label><br />
        <label>Date des faits: <input id="r_date" type="date" /></label><br />
        <label>Résumé: <input id="r_resume" /></label><br />
        <label
          >Contenu:<br /><textarea
            id="r_contenu"
            rows="6"
            cols="60"
          ></textarea></label
        ><br />
        <button id="btnSaveReport">Enregistrer</button>
        <button id="btnCancelReport">Annuler</button>
        <div id="saveMsg"></div>
      </div>

      <div id="detail" class="hidden"></div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
